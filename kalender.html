<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPORT LIVE | Display</title>
    <style>
        /* Sikrer at kalenderen fylder hele skærmen uden scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fdfdfd; /* Kontrastoptimeret off-white baggrund */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Ingen scrollbarer på storskærmen */
            color: #1a1a1a; /* Kontrastoptimeret mørkegrå/sort tekst */
        }

        /* Hovedcontainer der holder de 5 kolonner */
        #calendar-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Hver månedskolonne */
        .month-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #e0e0e0;
            box-sizing: border-box;
        }
        
        /* Fjern højre kant på den sidste kolonne */
        .month-column:last-child {
            border-right: none;
        }

        /* Overskrift for måneden */
        .month-header {
            height: 3.5vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1vw; 
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px solid #a0a0a0;
            background-color: #fdfdfd; 
            letter-spacing: 2px;
        }

        /* Række for hver dag (31 rækker i alt per måned for at holde nettet lige) */
        .day-row {
            height: calc(96.5vh / 31); 
            display: flex;
            border-bottom: 1px solid #eaeaea;
            box-sizing: border-box;
        }
        
        .day-row:last-child {
            border-bottom: none;
        }

        /* Feltet til dato-tallet */
        .date-number {
            width: 1.6vw; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95vw; 
            font-weight: 700;
            border-right: 1px solid #eaeaea;
            background-color: #f4f4f4; 
        }

        /* Det tomme område til højre for tallet, hvor data skal vises senere */
        .date-content {
            flex: 1;
            padding: 0 0.5vw;
            display: flex;
            align-items: center;
            font-size: 0.9vw;
            font-weight: 500;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Weekend og helligdag styling */
        .weekend {
            color: #dc3545; /* SPORT LIVE rød */
        }

        /* Styling til de tomme dage i måneder med 28/29/30 dage */
        .empty-day .date-number {
            background-color: #fdfdfd; 
            border-right: 1px solid transparent;
        }
    </style>
</head>
<body>

    <div id="calendar-container"></div>

    <script>
        const container = document.getElementById('calendar-container');
        const monthNames = ['JANUAR', 'FEBRUAR', 'MARTS', 'APRIL', 'MAJ', 'JUNI', 'JULI', 'AUGUST', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DECEMBER'];
        
        // Finder dags dato som udgangspunkt
        const currentDate = new Date();
        const currentMonthIndex = currentDate.getMonth();
        const currentYear = currentDate.getFullYear();

        // Funktion til at beregne Påskedag for et givent år (Meeus/Jones/Butcher algoritme)
        function getEaster(year) {
            const a = year % 19, b = Math.floor(year / 100), c = year % 100;
            const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
            const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
            const i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
            const day = ((h + l - 7 * m + 114) % 31) + 1;
            return new Date(year, month, day);
        }

        // Funktion der tjekker, om en specifik dato er en dansk helligdag
        function isHoliday(y, m, d) {
            const dateStr = y + "-" + String(m + 1).padStart(2, '0') + "-" + String(d).padStart(2, '0');
            const easter = getEaster(y);
            
            const addDays = (date, days) => {
                const result = new Date(date.getTime());
                result.setDate(result.getDate() + days);
                return result.getFullYear() + "-" + String(result.getMonth() + 1).padStart(2, '0') + "-" + String(result.getDate()).padStart(2, '0');
            };

            const holidays = [
                y + "-01-01", // Nytårsdag
                y + "-06-05", // Grundlovsdag
                y + "-12-24", // Juleaften
                y + "-12-25", // 1. Juledag
                y + "-12-26", // 2. Juledag
                y + "-12-31", // Nytårsaften
                addDays(easter, -3), // Skærtorsdag
                addDays(easter, -2), // Langfredag
                addDays(easter, 0),  // Påskedag
                addDays(easter, 1),  // 2. Påskedag
                addDays(easter, 39), // Kr. Himmelfartsdag
                addDays(easter, 49), // Pinsedag
                addDays(easter, 50)  // 2. Pinsedag
            ];

            return holidays.includes(dateStr);
        }

        // Bygger 5 kolonner (måneder)
        for (let i = 0; i < 5; i++) {
            // Beregner korrekt måned og år (hvis vi rammer over nytår)
            let m = (currentMonthIndex + i) % 12;
            let y = currentYear + Math.floor((currentMonthIndex + i) / 12);

            // Finder antallet af dage i den specifikke måned
            let daysInMonth = new Date(y, m + 1, 0).getDate();

            // Opretter kolonnen
            let col = document.createElement('div');
            col.className = 'month-column';

            // Opretter månedsoverskriften
            let header = document.createElement('div');
            header.className = 'month-header';
            header.textContent = monthNames[m];
            col.appendChild(header);

            // Opretter præcis 31 rækker i hver kolonne for at sikre 100% vandret alignment
            for (let d = 1; d <= 31; d++) {
                let row = document.createElement('div');
                row.className = 'day-row';

                let dateBox = document.createElement('div');
                dateBox.className = 'date-number';

                let contentBox = document.createElement('div');
                contentBox.className = 'date-content';

                // Tjekker om dagen eksisterer i den aktuelle måned
                if (d <= daysInMonth) {
                    dateBox.textContent = d;
                    
                    // Tjekker ugedagen OG om det er en dansk helligdag
                    let dayOfWeek = new Date(y, m, d).getDay();
                    if (dayOfWeek === 0 || dayOfWeek === 6 || isHoliday(y, m, d)) { 
                        dateBox.classList.add('weekend');
                    }
                } else {
                    // Tomme rækker i bunden af måneder med under 31 dage
                    row.classList.add('empty-day');
                }

                row.appendChild(dateBox);
                row.appendChild(contentBox);
                col.appendChild(row);
            }
            
            // Tilføjer kolonnen til hovedcontaineren
            container.appendChild(col);
        }
    </script>
</body>
</html>
