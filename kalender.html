<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPORT LIVE | Wall Calendar</title>
    <style>
        /* Sikrer at kalenderen fylder hele skærmen uden scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Ingen scrollbarer på storskærmen */
            color: #000000;
        }

        /* Hovedcontainer der holder de 5 kolonner */
        #calendar-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Hver månedskolonne */
        .month-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #e0e0e0;
            box-sizing: border-box;
        }
        
        /* Fjern højre kant på den sidste kolonne */
        .month-column:last-child {
            border-right: none;
        }

        /* Overskrift for måneden - Gjort lavere og med mindre skrift */
        .month-header {
            height: 3.5vh; /* NYT: Optimeret fra 5vh til 3.5vh for at vinde plads */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4vw; /* NYT: Mindre skrift, optimeret fra 1.8vw */
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px solid #a0a0a0;
            background-color: #ffffff;
            letter-spacing: 2px;
        }

        /* Række for hver dag (31 rækker i alt per måned for at holde nettet lige) */
        .day-row {
            height: calc(96.5vh / 31); /* NYT: 96.5vh fordeles nu mellem rækkerne (pga overskriften blev lavere) */
            display: flex;
            border-bottom: 1px solid #eaeaea;
            box-sizing: border-box;
        }
        
        .day-row:last-child {
            border-bottom: none;
        }

        /* Feltet til dato-tallet - Gjort lidt smallere */
        .date-number {
            width: 2.0vw; /* NYT: Reduceret fra 2.5vw for at vinde lidt bredde til tekst */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1vw;
            font-weight: 700;
            border-right: 1px solid #eaeaea;
            background-color: #fafafa;
        }

        /* Det tomme område til højre for tallet, hvor data skal vises senere */
        .date-content {
            flex: 1;
            padding: 0 0.5vw;
            display: flex;
            align-items: center;
            font-size: 0.9vw;
            font-weight: 500;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Weekend styling (Lørdag/Søndag) */
        .weekend {
            color: #dc3545; /* SPORT LIVE rød/advarselsfarve */
        }

        /* Styling til de tomme dage i måneder med 28/29/30 dage */
        .empty-day .date-number {
            background-color: #ffffff;
            border-right: 1px solid transparent;
        }
    </style>
</head>
<body>

    <div id="calendar-container"></div>

    <script>
        const container = document.getElementById('calendar-container');
        const monthNames = ['JANUAR', 'FEBRUAR', 'MARTS', 'APRIL', 'MAJ', 'JUNI', 'JULI', 'AUGUST', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DECEMBER'];
        
        // Finder dags dato som udgangspunkt
        const currentDate = new Date();
        const currentMonthIndex = currentDate.getMonth();
        const currentYear = currentDate.getFullYear();

        // Bygger 5 kolonner (måneder)
        for (let i = 0; i < 5; i++) {
            // Beregner korrekt måned og år (hvis vi rammer over nytår)
            let m = (currentMonthIndex + i) % 12;
            let y = currentYear + Math.floor((currentMonthIndex + i) / 12);

            // Finder antallet af dage i den specifikke måned
            let daysInMonth = new Date(y, m + 1, 0).getDate();

            // Opretter kolonnen
            let col = document.createElement('div');
            col.className = 'month-column';

            // Opretter månedsoverskriften
            let header = document.createElement('div');
            header.className = 'month-header';
            header.textContent = monthNames[m];
            col.appendChild(header);

            // Opretter præcis 31 rækker i hver kolonne for at sikre 100% vandret alignment
            for (let d = 1; d <= 31; d++) {
                let row = document.createElement('div');
                row.className = 'day-row';

                let dateBox = document.createElement('div');
                dateBox.className = 'date-number';

                let contentBox = document.createElement('div');
                contentBox.className = 'date-content';

                // Tjekker om dagen eksisterer i den aktuelle måned (skjuler tal f.eks. d. 31. april)
                if (d <= daysInMonth) {
                    dateBox.textContent = d;
                    
                    // Tjekker ugedagen for at markere weekender
                    let dayOfWeek = new Date(y, m, d).getDay();
                    if (dayOfWeek === 0 || dayOfWeek === 6) { // 0 = Søndag, 6 = Lørdag
                        dateBox.classList.add('weekend');
                    }
                } else {
                    // Tomme rækker i bunden af måneder med under 31 dage
                    row.classList.add('empty-day');
                }

                row.appendChild(dateBox);
                row.appendChild(contentBox);
                col.appendChild(row);
            }
            
            // Tilføjer kolonnen til hovedcontaineren
            container.appendChild(col);
        }
    </script>
</body>
</html>
