<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPORT LIVE | Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fdfdfd;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #1a1a1a;
        }

        #calendar-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        .month-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #d0d0d0; 
            box-sizing: border-box;
            min-width: 0; 
        }
        
        .month-column:last-child {
            border-right: none;
        }

        .month-header {
            height: 3.2vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1vw; 
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px solid #a0a0a0;
            background-color: #fdfdfd; 
            letter-spacing: 2px;
            z-index: 10;
            flex-shrink: 0;
        }

        .day-row {
            height: calc(96.8vh / 31); 
            display: flex;
            border-bottom: 1px solid #c0c0c0; 
            box-sizing: border-box;
            overflow: hidden;
            position: relative; 
        }
        
        .day-row:last-child {
            border-bottom: none;
        }

        .date-number {
            width: 1.6vw; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9vw; 
            font-weight: 700;
            border-right: 1px solid #c0c0c0; 
            background-color: #f4f4f4; 
            flex-shrink: 0;
        }

        /* NYT: Elegant cirkel-markering af datoer */
        .date-circle {
            width: 1.25vw;
            height: 1.25vw;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .weekend .date-circle {
            background-color: #dc3545;
            color: #ffffff;
        }

        .date-content {
            flex: 1;
            position: relative; 
            overflow: hidden;
        }

        .animator-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .page {
            height: 100%;
            width: 100%;
            padding: 3px 1.5vw 0px 6px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            gap: 2px; 
        }

        .program-line {
            font-size: 0.62vw; 
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip; 
            line-height: 1.05; 
            margin-bottom: 0; 
            -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%);
            mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }

        .paging-dots {
            position: absolute;
            right: 0.4vw;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
            width: 0.6vw;
        }

        .dot {
            width: 3px; 
            height: 3px; 
            background-color: #d0d0d0;
            border-radius: 50%;
            transition: background-color 0.8s, transform 0.8s;
        }

        .dot.active {
            background-color: #555;
            transform: scale(1.4); 
        }

        .color-blue { color: #0056b3; }
        .color-green { color: #28a745; }
        .color-black { color: #1a1a1a; }
        .color-red { color: #dc3545; }

        .even-week { background-color: #f5f7f9; }
        .even-week .date-number { background-color: #ebedf0; }

        .empty-day .date-number { background-color: transparent; border-right: 1px solid transparent; }
        .empty-day { border-bottom: 1px solid transparent; }

        #loader {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.7vw;
            color: #ccc;
            z-index: 100;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="loader">Opdaterer...</div>
    <div id="calendar-container"></div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbznTiMKZZDJhmuZpArHJLwZcN-Ic745YuXZitWrdDojG-L3KuW-VXy0mtJUPOE3xCR1/exec';
        const container = document.getElementById('calendar-container');
        const monthNames = ['JANUAR', 'FEBRUAR', 'MARTS', 'APRIL', 'MAJ', 'JUNI', 'JULI', 'AUGUST', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DECEMBER'];
        
        let produktioner = [];
        let globalTick = 0; 

        function getProgramColorAndPriority(p) {
            const kanalNavn = String(p.Kanal || "").trim();
            const unitLower = String(p.Unit || "").toLowerCase().trim();
            const colorBlueUnits = ["minitech", "nowtek ob1", "nowtek ob2", "ob 7", "ob 9", "sam ob"];
            const boksUnits = ["boks", "boks 1", "boks 2", "boks 3", "boks 4", "boks 5", "boks 6", "boks 7", "brt", "srt"];

            if (kanalNavn === "SPORT LIVE" && (colorBlueUnits.includes(unitLower) || unitLower === "")) {
                return { color: 'color-blue', prio: 1 };
            } else if (kanalNavn === "SPORT LIVE" && boksUnits.includes(unitLower)) {
                return { color: 'color-green', prio: 2 };
            } else if (kanalNavn === "EFP" || unitLower === "efp") {
                return { color: 'color-black', prio: 3 };
            } else if (kanalNavn !== "SPORT LIVE" && colorBlueUnits.includes(unitLower)) {
                return { color: 'color-red', prio: 4 };
            } else {
                return { color: 'color-black', prio: 3 }; 
            }
        }

        function parseTime(t) {
            if (!t) return "99:99"; 
            let str = String(t).replace('.', ':').trim();
            if (str.length === 4 && str.includes(':')) {
                str = "0" + str;
            }
            return str;
        }

        function vaskTekst(sportsgren, titel) {
            let s = sportsgren ? String(sportsgren).trim() : "";
            let t = titel ? String(titel).trim() : "";

            const forkortelser = [
                { fra: /Basketball/gi, til: "Basket" },
                { fra: /Volleyball/gi, til: "Volley" },
                { fra: /Amerikansk fodbold/gi, til: "Football" },
                { fra: /European League/gi, til: "EL" },
                { fra: /Randers Cimbria/gi, til: "Randers" },
                { fra: /Team FOG Næstved/gi, til: "Næstved" },
                { fra: /Horsens IC/gi, til: "Horsens" },
                { fra: /Værløse Blue Hawks/gi, til: "Værløse" },
                { fra: /Svendborg Rabbits/gi, til: "Svendborg" },
                { fra: /BMS Herlev/gi, til: "Herlev" },
                { fra: /Bakken Bears/gi, til: "Bakken" },
                { fra: /BK Vejen/gi, til: "Vejen" },
                { fra: /kvalifikation/gi, til: "kval" }
            ];

            // NYT: "elitedivisionen" er nu fjernet fra listen, så den forbliver synlig!
            const udeladelser = [
                "basket", "futsal", "volley", "tennis", "bordtennis", 
                "liga portugal", "coppa italia", "supercopa", "supercoppa", "WTT", 
                "davis cup", "billie jean king cup", "mermaid bowl", "gokart"
            ];

            forkortelser.forEach(f => {
                s = s.replace(f.fra, f.til);
                t = t.replace(f.fra, f.til);
            });

            let visSportsgren = true;
            const tLower = t.toLowerCase();
            udeladelser.forEach(ord => {
                if (tLower.includes(ord.toLowerCase())) visSportsgren = false;
            });

            return (!visSportsgren || s === "") ? t : `${s}: ${t}`;
        }

        function getEaster(year) {
            const a = year % 19, b = Math.floor(year / 100), c = year % 100;
            const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
            const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
            const i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
            const day = ((h + l - 7 * m + 114) % 31) + 1;
            return new Date(year, month, day);
        }

        function isHoliday(y, m, d) {
            const dateStr = y + "-" + String(m + 1).padStart(2, '0') + "-" + String(d).padStart(2, '0');
            const easter = getEaster(y);
            const addDays = (date, days) => {
                const res = new Date(date.getTime());
                res.setDate(res.getDate() + days);
                return res.getFullYear() + "-" + String(res.getMonth() + 1).padStart(2, '0') + "-" + String(res.getDate()).padStart(2, '0');
            };
            const h = [y+"-01-01", y+"-06-05", y+"-12-24", y+"-12-25", y+"-12-26", y+"-12-31", addDays(easter, -3), addDays(easter, -2), addDays(easter, 0), addDays(easter, 1), addDays(easter, 39), addDays(easter, 49), addDays(easter, 50)];
            return h.includes(dateStr);
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
        }

        async function fetchProductionData() {
            const loader = document.getElementById('loader');
            if(loader) loader.style.opacity = "1";
            try {
                const response = await fetch(scriptURL + "?action=getdata");
                const data = await response.json();
                produktioner = data.programmer || [];
                tegnKalender();
            } catch (error) { console.error(error); }
            if(loader) loader.style.opacity = "0";
        }

        function tegnKalender() {
            container.innerHTML = '';
            const currentDate = new Date();
            const currentMonthIndex = currentDate.getMonth();
            const currentYear = currentDate.getFullYear();

            for (let i = 0; i < 5; i++) {
                let m = (currentMonthIndex + i) % 12;
                let y = currentYear + Math.floor((currentMonthIndex + i) / 12);
                let daysInMonth = new Date(y, m + 1, 0).getDate();

                let col = document.createElement('div');
                col.className = 'month-column';
                let header = document.createElement('div');
                header.className = 'month-header';
                header.textContent = monthNames[m];
                col.appendChild(header);

                for (let d = 1; d <= 31; d++) {
                    let row = document.createElement('div');
                    row.className = 'day-row';
                    let dateBox = document.createElement('div');
                    dateBox.className = 'date-number';
                    let contentBox = document.createElement('div');
                    contentBox.className = 'date-content';

                    if (d <= daysInMonth) {
                        // NYT: Datoen indsættes nu i en dedikeret cirkel-div for at styre baggrundsfarven
                        let circle = document.createElement('div');
                        circle.className = 'date-circle';
                        circle.textContent = d;
                        dateBox.appendChild(circle);

                        let dateObj = new Date(y, m, d);
                        const dateStr = y + "-" + String(m + 1).padStart(2, '0') + "-" + String(d).padStart(2, '0');
                        
                        if (dateObj.getDay() === 0 || dateObj.getDay() === 6 || isHoliday(y, m, d)) dateBox.classList.add('weekend');
                        if (getWeekNumber(dateObj) % 2 === 0) row.classList.add('even-week');

                        let dagensProduktioner = produktioner.filter(p => {
                            if (!p.Dato) return false;
                            const pDato = new Date(p.Dato);
                            return (pDato.getFullYear() === y && pDato.getMonth() === m && pDato.getDate() === d);
                        }).filter(p => {
                            const obUnits = ["EFP", "Minitech", "Nowtek OB1", "Nowtek OB2", "OB 7", "OB 9", "SAM OB"];
                            return (p.Kanal === "SPORT LIVE") || obUnits.includes(String(p.Unit || "").trim());
                        });

                        if (dagensProduktioner.length > 0) {
                            dagensProduktioner.sort((a, b) => {
                                const infoA = getProgramColorAndPriority(a);
                                const infoB = getProgramColorAndPriority(b);

                                if (infoA.prio !== infoB.prio) {
                                    return infoA.prio - infoB.prio;
                                }

                                if (infoA.prio === 1 || infoA.prio === 2) {
                                    const tidA = parseTime(a.Tid);
                                    const tidB = parseTime(b.Tid);
                                    return tidA.localeCompare(tidB);
                                }

                                return 0; 
                            });

                            const totalPages = Math.ceil(dagensProduktioner.length / 2);
                            
                            const animatorWrapper = document.createElement('div');
                            animatorWrapper.className = 'animator-wrapper';
                            animatorWrapper.dataset.pages = totalPages;

                            for (let pageIdx = 0; pageIdx < totalPages; pageIdx++) {
                                const pageDiv = document.createElement('div');
                                pageDiv.className = 'page';
                                
                                const startIdx = pageIdx * 2;
                                const visningsData = dagensProduktioner.slice(startIdx, startIdx + 2);

                                visningsData.forEach(p => {
                                    const line = document.createElement('div');
                                    line.className = 'program-line';
                                    
                                    const info = getProgramColorAndPriority(p);
                                    line.classList.add(info.color);

                                    let tbcTxt = (p.TBC && String(p.TBC).toUpperCase() === 'X') ? " (TBC)" : "";
                                    line.textContent = vaskTekst(p.Sportsgren, p.Programtitel) + tbcTxt;
                                    pageDiv.appendChild(line);
                                });
                                animatorWrapper.appendChild(pageDiv);
                            }
                            contentBox.appendChild(animatorWrapper);

                            if (totalPages > 1) {
                                const startPage = globalTick % totalPages;
                                animatorWrapper.style.transform = `translateY(-${startPage * 100}%)`;

                                const dotsContainer = document.createElement('div');
                                dotsContainer.className = 'paging-dots';
                                for (let p = 0; p < totalPages; p++) {
                                    const dot = document.createElement('div');
                                    dot.className = 'dot' + (p === startPage ? ' active' : '');
                                    dotsContainer.appendChild(dot);
                                }
                                row.appendChild(dotsContainer);
                            }
                        }
                    } else { row.classList.add('empty-day'); }

                    row.appendChild(dateBox);
                    row.appendChild(contentBox);
                    col.appendChild(row);
                }
                container.appendChild(col);
            }
        }

        function opdaterAnimationer() {
            globalTick++;
            const wrappers = document.querySelectorAll('.animator-wrapper');
            wrappers.forEach(wrapper => {
                const totalPages = parseInt(wrapper.dataset.pages);
                if (totalPages > 1) {
                    const currentPage = globalTick % totalPages;
                    wrapper.style.transform = `translateY(-${currentPage * 100}%)`;
                    
                    const row = wrapper.closest('.day-row');
                    const dots = row.querySelectorAll('.dot');
                    dots.forEach((dot, index) => {
                        if (index === currentPage) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                }
            });
        }

        fetchProductionData();
        setInterval(fetchProductionData, 180000); 
        setInterval(opdaterAnimationer, 7000);
    </script>
</body>
</html>
